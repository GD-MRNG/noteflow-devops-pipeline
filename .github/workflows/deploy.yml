name: Deploy

on:
  workflow_run:
    workflows: ["Build & Push"]
    branches: [main]
    types: [completed]

jobs:
  deploy-staging:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: tag
        run: echo "value=sha-$(echo '${{ github.event.workflow_run.head_sha }}' | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to staging
        run: doppler run --token "${{ secrets.DOPPLER_TOKEN_STAGING }}" --project noteflow --config staging -- flyctl deploy --config fly.toml --image ghcr.io/gd-mrng/noteflow-devops-pipeline:${{ steps.tag.outputs.value }}

  zap-scan:
    name: ZAP Baseline Scan
    needs: deploy-staging
    runs-on: ubuntu-latest
    steps:
      - name: ZAP baseline scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: https://noteflow-staging.fly.dev
          fail_action: true
          artifact_name: zap-report

  deploy-production:
    needs: zap-scan
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: tag
        run: echo "value=sha-$(echo '${{ github.event.workflow_run.head_sha }}' | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to production
        run: doppler run --token "${{ secrets.DOPPLER_TOKEN_PRODUCTION }}" --project noteflow --config production -- flyctl deploy --config fly.production.toml --image ghcr.io/gd-mrng/noteflow-devops-pipeline:${{ steps.tag.outputs.value }}
