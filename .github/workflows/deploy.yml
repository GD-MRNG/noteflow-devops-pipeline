name: Deploy

on:
  workflow_run:
    workflows: ["Build & Push"]
    branches: [main]
    types: [completed]

jobs:
  deploy-staging:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: tag
        run: echo "value=sha-$(echo '${{ github.event.workflow_run.head_sha }}' | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Inject secrets from Doppler
        uses: dopplerhq/cli-action@v3
        with:
          token: ${{ secrets.DOPPLER_TOKEN_STAGING }}
          project: noteflow
          config: staging
          inject-env-vars: true

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to staging
        run: flyctl deploy --config fly.toml --image ghcr.io/gd-mrng/noteflow-devops-pipeline:${{ steps.tag.outputs.value }}

  deploy-production:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: tag
        run: echo "value=sha-$(echo '${{ github.event.workflow_run.head_sha }}' | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Inject secrets from Doppler
        uses: dopplerhq/cli-action@v3
        with:
          token: ${{ secrets.DOPPLER_TOKEN_PRODUCTION }}
          project: noteflow
          config: production
          inject-env-vars: true

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to production
        run: flyctl deploy --config fly.production.toml --image ghcr.io/gd-mrng/noteflow-devops-pipeline:${{ steps.tag.outputs.value }}
