name: Terraform

on:
  pull_request:
    paths:
      - 'infrastructure/terraform/**'
  push:
    branches:
      - main
    paths:
      - 'infrastructure/terraform/**'

permissions:
  contents: read
  pull-requests: write  # required to post plan comments

env:
  TF_WORKING_DIR: infrastructure/terraform
  TF_WORKSPACE: noteflow-staging

jobs:
  trivy-iac:
    name: Trivy IaC Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Trivy IaC scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: infrastructure/terraform/
          severity: HIGH,CRITICAL
          exit-code: 1

  plan:
    name: Plan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: trivy-iac
    defaults:
      run:
        working-directory: infrastructure/terraform

    steps:
      - uses: actions/checkout@v4

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Inject secrets from Doppler
        run: doppler secrets download --token "${{ secrets.DOPPLER_TOKEN_STAGING }}" --project noteflow --config staging --no-file --format env >> $GITHUB_ENV

      - uses: hashicorp/setup-terraform@v4
        with:
          cli_config_credentials_token: ${{ env.TF_API_TOKEN }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color 2>&1 | tee /tmp/plan.txt
        continue-on-error: true

      - name: Post Plan Comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const raw = fs.readFileSync('/tmp/plan.txt', 'utf8');
            // Trim to stay under GitHub's 65536-char comment limit
            const plan = raw.length > 60000
              ? raw.slice(0, 60000) + '\n\n... (truncated — see workflow logs for full output)'
              : raw;

            const body = [
              '## Terraform Plan',
              '',
              '| | |',
              '|---|---|',
              `| Workspace | \`${process.env.TF_WORKSPACE}\` |`,
              `| Result | \`${{ steps.plan.outcome }}\` |`,
              '',
              '<details>',
              '<summary>Show plan output</summary>',
              '',
              '```',
              plan,
              '```',
              '</details>',
            ].join('\n');

            // Update existing bot comment if present, otherwise create new
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('## Terraform Plan')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

  apply:
    name: Apply (staging)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: staging
    defaults:
      run:
        working-directory: infrastructure/terraform

    steps:
      - uses: actions/checkout@v4

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Inject secrets from Doppler
        run: doppler secrets download --token "${{ secrets.DOPPLER_TOKEN_STAGING }}" --project noteflow --config staging --no-file --format env >> $GITHUB_ENV

      - uses: hashicorp/setup-terraform@v4
        with:
          cli_config_credentials_token: ${{ env.TF_API_TOKEN }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve -no-color
