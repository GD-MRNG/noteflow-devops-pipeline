app = "noteflow-alloy"
primary_region = "lax"

[build]
  dockerfile = "Dockerfile"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

# Alloy's built-in UI — useful for debugging scrape targets
[http_service]
  internal_port = 12345
  force_https = true
  auto_stop_machines = true
  min_machines_running = 1
